services:
  db:
    image: postgres:16
    container_name: fin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fin_dev
      POSTGRES_USER: fin
      POSTGRES_PASSWORD: fin_dev_pw_change_me
    ports:
      - "5432:5432"
    volumes:
      - fin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin -d fin_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    container_name: fin_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: fin_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-fin_dev}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-fin_dev_secret_change_me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fin_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: fin_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-fin_dev}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-fin_dev_secret_change_me}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-fin-docs-dev}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$STORAGE_BUCKET &&
        mc anonymous set private local/$$STORAGE_BUCKET &&
        echo 'Bucket ready.' &&
        exit 0
      "
    restart: on-failure

volumes:
  fin_pgdata:
  fin_minio_data:
