services:
  db:
    image: postgres:16
    container_name: fin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fin_dev
      POSTGRES_USER: fin
      POSTGRES_PASSWORD: fin_dev_pw_change_me
    ports:
      - "5432:5432"
    volumes:
      - fin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin -d fin_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    container_name: fin_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  fin_pgdata:
